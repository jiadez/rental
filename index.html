<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>租屋評估表</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #DDD9D3;
    --accent: #3B6EA5;
    --accent-light: #EBF1F9;
    --accent-dark: #2A5080;
    --text: #1A1A1A;
    --text-muted: #6B6560;
    --good: #2D7D46;
    --good-bg: #EAF6EE;
    --bad: #C0392B;
    --bad-bg: #FDEDEB;
    --warn: #B7651A;
    --warn-bg: #FEF3E6;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: var(--accent);
    color: #fff;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(59,110,165,0.3);
  }
  header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.05em; }
  header span { font-size: 0.85rem; opacity: 0.8; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dark); }
  .btn-outline { background: var(--surface); color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-outline:hover { background: var(--accent-light); }
  .btn-danger { background: #fff; color: var(--bad); border: 1.5px solid var(--bad); }
  .btn-danger:hover { background: var(--bad-bg); }

  .search-bar {
    flex: 1;
    min-width: 180px;
    padding: 9px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    background: var(--surface);
  }
  .search-bar:focus { outline: none; border-color: var(--accent); }

  /* Cards Grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.2s;
    border: 1.5px solid var(--border);
  }
  .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.12); }

  .card-photos {
    width: 100%;
    height: 190px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .card-photos img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .photo-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    gap: 8px;
  }
  .photo-placeholder svg { opacity: 0.4; }
  .photo-count-badge {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .photo-add-btn {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(59,110,165,0.85);
    color: #fff;
    font-size: 0.78rem;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    font-family: inherit;
  }
  .photo-add-btn:hover { background: var(--accent); }

  .visited-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
  }
  .visited-badge.yes { background: var(--good); color: #fff; }
  .visited-badge.no { background: rgba(0,0,0,0.45); color: #fff; }

  .card-body { padding: 16px; }

  .card-address {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.45;
  }

  .card-price {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .card-price small { font-size: 0.75rem; font-weight: 400; color: var(--text-muted); }

  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 500;
  }
  .tag.yes { background: var(--good-bg); color: var(--good); }
  .tag.no { background: #F2F2F2; color: #999; text-decoration: line-through; }
  .tag.warn { background: var(--warn-bg); color: var(--warn); }
  .tag.neutral { background: var(--accent-light); color: var(--accent); }

  .balcony-row {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .card-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .card-meta span { display: inline-flex; align-items: center; gap: 4px; }

  .card-notes {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .card-requirements {
    margin-bottom: 12px;
  }
  .req-label { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; }
  .req-list { list-style: none; display: flex; flex-wrap: wrap; gap: 5px; }
  .req-list li {
    background: #EBF1F9;
    color: var(--accent-dark);
    font-size: 0.76rem;
    padding: 2px 9px;
    border-radius: 5px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .card-actions .btn { flex: 1; justify-content: center; padding: 8px; font-size: 0.82rem; }

  /* Score */
  .score-bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .score-bar-bg { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 99px; background: var(--accent); transition: width 0.5s; }
  .score-label { font-size: 0.8rem; font-weight: 700; color: var(--accent); min-width: 32px; text-align: right; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    width: 100%;
    max-width: 620px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 12px 48px rgba(0,0,0,0.2);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }
  .modal-header h2 { font-size: 1.05rem; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-muted); line-height: 1; }
  .modal-body { padding: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    background: var(--surface);
    transition: border-color 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-textarea { resize: vertical; min-height: 80px; }

  .checkbox-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 8px;
  }
  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .checkbox-item input { accent-color: var(--accent); }
  .checkbox-item:has(input:checked) { border-color: var(--accent); background: var(--accent-light); }

  .photo-preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 10px;
  }
  .photo-thumb {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    border: 1.5px solid var(--border);
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-remove {
    position: absolute;
    top: 4px; right: 4px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 22px; height: 22px;
    font-size: 0.8rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 0.85rem;
    transition: border-color 0.15s;
  }
  .upload-zone:hover { border-color: var(--accent); color: var(--accent); }

  .modal-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    position: sticky;
    bottom: 0;
    background: var(--surface);
  }

  /* Photo lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
  .lightbox-close {
    position: absolute; top: 16px; right: 20px;
    color: #fff; font-size: 2rem; cursor: pointer; background: none; border: none;
  }
  .lightbox-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    color: #fff; font-size: 2rem; cursor: pointer; background: rgba(255,255,255,0.15);
    border: none; border-radius: 50%; width: 48px; height: 48px;
    display: flex; align-items: center; justify-content: center;
  }
  .lightbox-prev { left: 16px; }
  .lightbox-next { right: 16px; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state svg { opacity: 0.3; margin-bottom: 12px; }

  /* Requirements modal */
  .req-tags-editor { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .req-tag-edit {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--accent-light); color: var(--accent-dark);
    padding: 4px 10px; border-radius: 6px; font-size: 0.82rem;
  }
  .req-tag-del { background: none; border: none; cursor: pointer; font-size: 0.9rem; color: var(--bad); }
  .req-add-row { display: flex; gap: 8px; margin-top: 8px; }
  .req-add-row input { flex: 1; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <h1>🏠 租屋評估表</h1>
  <span id="headerCount">0 間物件</span>
</header>

<div class="container">
  <div class="toolbar">
    <input type="text" class="search-bar" placeholder="搜尋地址、備註…" oninput="filterCards(this.value)">
    <button class="btn btn-primary" onclick="openModal()">＋ 新增物件</button>
    <button class="btn btn-outline" onclick="exportData()">↓ 匯出 JSON</button>
  </div>

  <div class="cards-grid" id="cardsGrid"></div>
  <div class="empty-state hidden" id="emptyState">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <p>找不到符合條件的物件</p>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay hidden" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modalTitle">新增物件</h2>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">地址 *</label>
        <input type="text" class="form-input" id="f_address" placeholder="例：臺中市北區漢口路四段 XXX">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">租金</label>
          <input type="text" class="form-input" id="f_price" placeholder="例：12,000（含管）">
        </div>
        <div class="form-group">
          <label class="form-label">看屋時間</label>
          <input type="text" class="form-input" id="f_viewtime" placeholder="例：6/15 早上10:20">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">陽台大小</label>
        <select class="form-select" id="f_balcony">
          <option value="">無</option>
          <option value="小">小</option>
          <option value="中">中</option>
          <option value="大">大</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">設備與條件</label>
        <div class="checkbox-grid" id="featureCheckboxes"></div>
      </div>

      <div class="form-group">
        <label class="form-label">備註</label>
        <textarea class="form-textarea" id="f_notes" placeholder="電費計算方式、特殊條件…"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">個人條件需求</label>
        <div class="req-tags-editor" id="reqTagsEditor"></div>
        <div class="req-add-row">
          <input type="text" class="form-input" id="reqInput" placeholder="新增需求項目" onkeydown="if(event.key==='Enter')addReqTag()">
          <button class="btn btn-outline" onclick="addReqTag()">＋ 新增</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">照片</label>
        <div class="upload-zone" onclick="document.getElementById('photoInput').click()">
          📷 點擊上傳照片（可多選）
        </div>
        <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotoUpload(event)">
        <div class="photo-preview-grid" id="photoPreviewGrid"></div>
      </div>

      <div class="form-group">
        <label class="checkbox-item" style="display:flex;max-width:200px">
          <input type="checkbox" id="f_visited"> 已看過此物件
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveItem()">儲存</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox hidden" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <button class="lightbox-nav lightbox-prev" onclick="lbNav(-1)">‹</button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="lbNav(1)">›</button>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────
const FEATURES = [
  { key:'water', label:'台水' },
  { key:'electric', label:'台電' },
  { key:'bike', label:'子母車位' },
  { key:'dispenser', label:'飲水機' },
  { key:'elevator', label:'電梯' },
  { key:'subsidy', label:'租補助' },
];

const DEFAULT_DATA = [
  {
    id:1, address:'臺中市北區漢口路四段 紐約廣場', price:'12,300（含管）', viewtime:'4/6 早上',
    visited:true, balcony:'中', water:true, electric:true, bike:true, dispenser:false, elevator:true, subsidy:true,
    notes:'', requirements:[], photos:[]
  },
  {
    id:2, address:'臺中市北區山西路一段', price:'12,000（含管）', viewtime:'6/15 早上10:20',
    visited:false, balcony:'中', water:false, electric:false, bike:true, dispenser:true, elevator:true, subsidy:true,
    notes:'一度電5元，夏季6～9月一度6元；水費包含', requirements:[], photos:[]
  },
  {
    id:3, address:'臺中市北區英士路', price:'9,000（含管）', viewtime:'',
    visited:false, balcony:'大', water:false, electric:false, bike:true, dispenser:true, elevator:false, subsidy:true,
    notes:'', requirements:[], photos:[]
  },
  {
    id:4, address:'臺中市北屯區瀋陽路三段', price:'12,000（含管）', viewtime:'',
    visited:false, balcony:'中', water:false, electric:false, bike:true, dispenser:false, elevator:true, subsidy:true,
    notes:'', requirements:[], photos:[]
  },
  {
    id:5, address:'臺中市北區美德街', price:'12,000', viewtime:'',
    visited:false, balcony:'大', water:false, electric:false, bike:false, dispenser:true, elevator:false, subsidy:false,
    notes:'電費一度6元', requirements:[], photos:[]
  },
  {
    id:6, address:'臺中市北區雙十路二段', price:'12,000', viewtime:'',
    visited:false, balcony:'大', water:false, electric:false, bike:true, dispenser:true, elevator:false, subsidy:true,
    notes:'', requirements:[], photos:[]
  },
];

let items = JSON.parse(localStorage.getItem('rentalData') || 'null') || DEFAULT_DATA;
let nextId = Math.max(...items.map(i=>i.id), 0) + 1;
let editingId = null;
let currentPhotos = [];
let currentReqs = [];
let lbPhotos = [], lbIdx = 0;
let filterText = '';

function save() {
  localStorage.setItem('rentalData', JSON.stringify(items));
}

// ── Score ─────────────────────────────────────────────────────────
function score(item) {
  let s = 0;
  if(item.water) s += 15;
  if(item.electric) s += 15;
  if(item.elevator) s += 20;
  if(item.bike) s += 15;
  if(item.dispenser) s += 10;
  if(item.subsidy) s += 15;
  if(item.balcony==='大') s += 10;
  else if(item.balcony==='中') s += 5;
  return s;
}

// ── Render ────────────────────────────────────────────────────────
function renderAll() {
  const q = filterText.toLowerCase();
  const filtered = items.filter(i =>
    i.address.toLowerCase().includes(q) ||
    (i.notes||'').toLowerCase().includes(q)
  );

  const grid = document.getElementById('cardsGrid');
  const empty = document.getElementById('emptyState');
  document.getElementById('headerCount').textContent = `${items.length} 間物件`;

  if(filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  grid.innerHTML = filtered.map(cardHTML).join('');
}

function cardHTML(item) {
  const sc = score(item);
  const photo = item.photos && item.photos.length ? item.photos[0] : null;
  const photoCount = item.photos ? item.photos.length : 0;

  const featTags = FEATURES.map(f => {
    const on = item[f.key];
    return `<span class="tag ${on?'yes':'no'}">${on?'✓':'✗'} ${f.label}</span>`;
  }).join('');

  const balconyColor = item.balcony==='大'?'yes':item.balcony==='中'?'neutral':'no';

  const reqHTML = item.requirements && item.requirements.length
    ? `<div class="card-requirements">
        <div class="req-label">📋 個人需求</div>
        <ul class="req-list">${item.requirements.map(r=>`<li>${r}</li>`).join('')}</ul>
       </div>` : '';

  const notesHTML = item.notes
    ? `<div class="card-notes">📝 ${item.notes}</div>` : '';

  const metaHTML = item.viewtime
    ? `<div class="card-meta"><span>🗓 看屋：${item.viewtime}</span></div>` : '';

  return `<div class="card" id="card-${item.id}">
    <div class="card-photos" onclick="openLightbox(${item.id})">
      ${photo
        ? `<img src="${photo}" alt="物件照片">`
        : `<div class="photo-placeholder"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>尚無照片</span></div>`}
      <span class="visited-badge ${item.visited?'yes':'no'}">${item.visited?'✅ 已看':'待看'}</span>
      ${photoCount > 1 ? `<span class="photo-count-badge">+${photoCount} 張</span>` : ''}
      <button class="photo-add-btn" onclick="event.stopPropagation();openModalEdit(${item.id})">＋ 照片</button>
    </div>
    <div class="card-body">
      <div class="card-address">${item.address}</div>
      <div class="card-price">${item.price || '—'} <small>/月</small></div>
      <div class="score-bar-wrap">
        <div class="score-bar-bg"><div class="score-bar-fill" style="width:${sc}%"></div></div>
        <span class="score-label">${sc}分</span>
      </div>
      ${item.balcony ? `<div class="balcony-row">🌿 陽台：${item.balcony}</div>` : ''}
      <div class="tags-row">${featTags}</div>
      ${metaHTML}
      ${notesHTML}
      ${reqHTML}
      <div class="card-actions">
        <button class="btn btn-outline" onclick="openModalEdit(${item.id})">✏️ 編輯</button>
        <button class="btn btn-danger" onclick="deleteItem(${item.id})">🗑 刪除</button>
      </div>
    </div>
  </div>`;
}

// ── Modal ─────────────────────────────────────────────────────────
function buildFeatureCheckboxes(item) {
  return FEATURES.map(f => `
    <label class="checkbox-item">
      <input type="checkbox" id="feat_${f.key}" ${item&&item[f.key]?'checked':''}> ${f.label}
    </label>
  `).join('');
}

function openModal() {
  editingId = null;
  currentPhotos = [];
  currentReqs = [];
  document.getElementById('modalTitle').textContent = '新增物件';
  document.getElementById('f_address').value = '';
  document.getElementById('f_price').value = '';
  document.getElementById('f_viewtime').value = '';
  document.getElementById('f_balcony').value = '';
  document.getElementById('f_notes').value = '';
  document.getElementById('f_visited').checked = false;
  document.getElementById('featureCheckboxes').innerHTML = buildFeatureCheckboxes(null);
  renderReqTags();
  renderPhotoPreview();
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function openModalEdit(id) {
  const item = items.find(i => i.id === id);
  if(!item) return;
  editingId = id;
  currentPhotos = [...(item.photos || [])];
  currentReqs = [...(item.requirements || [])];
  document.getElementById('modalTitle').textContent = '編輯物件';
  document.getElementById('f_address').value = item.address;
  document.getElementById('f_price').value = item.price;
  document.getElementById('f_viewtime').value = item.viewtime||'';
  document.getElementById('f_balcony').value = item.balcony||'';
  document.getElementById('f_notes').value = item.notes||'';
  document.getElementById('f_visited').checked = !!item.visited;
  document.getElementById('featureCheckboxes').innerHTML = buildFeatureCheckboxes(item);
  renderReqTags();
  renderPhotoPreview();
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}
function handleOverlayClick(e) {
  if(e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveItem() {
  const address = document.getElementById('f_address').value.trim();
  if(!address) { alert('請輸入地址'); return; }
  const obj = {
    address,
    price: document.getElementById('f_price').value.trim(),
    viewtime: document.getElementById('f_viewtime').value.trim(),
    balcony: document.getElementById('f_balcony').value,
    notes: document.getElementById('f_notes').value.trim(),
    visited: document.getElementById('f_visited').checked,
    photos: [...currentPhotos],
    requirements: [...currentReqs],
  };
  FEATURES.forEach(f => {
    obj[f.key] = document.getElementById(`feat_${f.key}`).checked;
  });
  if(editingId) {
    const idx = items.findIndex(i => i.id === editingId);
    items[idx] = { ...items[idx], ...obj };
  } else {
    obj.id = nextId++;
    items.push(obj);
  }
  save();
  renderAll();
  closeModal();
}

function deleteItem(id) {
  if(!confirm('確定要刪除這個物件嗎？')) return;
  items = items.filter(i => i.id !== id);
  save();
  renderAll();
}

// ── Requirements ──────────────────────────────────────────────────
function renderReqTags() {
  const el = document.getElementById('reqTagsEditor');
  el.innerHTML = currentReqs.map((r,i) => `
    <span class="req-tag-edit">${r}
      <button class="req-tag-del" onclick="removeReq(${i})">×</button>
    </span>`).join('');
}
function addReqTag() {
  const inp = document.getElementById('reqInput');
  const v = inp.value.trim();
  if(!v) return;
  if(!currentReqs.includes(v)) { currentReqs.push(v); renderReqTags(); }
  inp.value = '';
}
function removeReq(i) { currentReqs.splice(i,1); renderReqTags(); }

// ── Photos ────────────────────────────────────────────────────────
function handlePhotoUpload(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      currentPhotos.push(ev.target.result);
      renderPhotoPreview();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
}
function renderPhotoPreview() {
  const grid = document.getElementById('photoPreviewGrid');
  grid.innerHTML = currentPhotos.map((src,i) => `
    <div class="photo-thumb">
      <img src="${src}" alt="">
      <button class="photo-remove" onclick="removePhoto(${i})">×</button>
    </div>`).join('');
}
function removePhoto(i) { currentPhotos.splice(i,1); renderPhotoPreview(); }

// ── Lightbox ──────────────────────────────────────────────────────
function openLightbox(id) {
  const item = items.find(i => i.id === id);
  if(!item || !item.photos || !item.photos.length) return;
  lbPhotos = item.photos;
  lbIdx = 0;
  document.getElementById('lightboxImg').src = lbPhotos[0];
  document.getElementById('lightbox').classList.remove('hidden');
}
function closeLightbox() { document.getElementById('lightbox').classList.add('hidden'); }
function lbNav(dir) {
  lbIdx = (lbIdx + dir + lbPhotos.length) % lbPhotos.length;
  document.getElementById('lightboxImg').src = lbPhotos[lbIdx];
}

// ── Filter ────────────────────────────────────────────────────────
function filterCards(v) { filterText = v; renderAll(); }

// ── Export ────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(items, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '租屋評估表.json';
  a.click();
}

// ── Init ──────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
