<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>租屋評估表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#F7F5F2;color:#1A1A1A;min-height:100vh}
.topbar{background:#185FA5;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot.ok{background:#9FE1CB}
.dot.loading{background:#FAC775;animation:blink 1s infinite}
.dot.err{background:#F09595}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
#ss{font-size:12px;opacity:0.85}
.toolbar{display:flex;gap:8px;padding:12px 16px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #E8E5E0;position:sticky;top:49px;z-index:90}
.si{flex:1;min-width:140px;padding:8px 12px;border:1px solid #DDD9D3;border-radius:8px;font-size:14px;background:#F7F5F2}
.si:focus{outline:none;border-color:#185FA5}
button{padding:8px 16px;border:1px solid #DDD9D3;border-radius:8px;background:#fff;color:#1A1A1A;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
button:hover{background:#F0EDE8}
button.pri{background:#185FA5;color:#fff;border-color:#185FA5}
button.pri:hover{background:#0C447C}
button.pri:disabled{opacity:0.5;cursor:not-allowed}
button.del{color:#A32D2D;border-color:#F7C1C1}
button.del:hover{background:#FCEBEB}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;padding:16px}
.card{background:#fff;border:1px solid #E8E5E0;border-radius:12px;overflow:hidden;transition:box-shadow 0.2s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.10)}
.cphoto{height:170px;background:#F0EDE8;position:relative;cursor:pointer;overflow:hidden}
.cphoto img{width:100%;height:100%;object-fit:cover}
.nophoto{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#9E9890;font-size:13px}
.vb{position:absolute;top:10px;left:10px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.vb.y{background:#3B6D11;color:#EAF3DE}
.vb.n{background:rgba(0,0,0,0.45);color:#fff}
.pcnt{position:absolute;bottom:8px;right:10px;background:rgba(0,0,0,0.55);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px}
.cb{padding:14px}
.addr{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.4}
.price{font-size:18px;font-weight:600;color:#185FA5;margin-bottom:10px}
.price small{font-size:12px;font-weight:400;color:#9E9890}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sbg{flex:1;height:6px;background:#E8E5E0;border-radius:99px;overflow:hidden}
.sfill{height:100%;background:#185FA5;border-radius:99px}
.sn{font-size:12px;font-weight:600;color:#185FA5;min-width:30px;text-align:right}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.tag{font-size:11px;padding:3px 8px;border-radius:5px}
.tag.y{background:#EAF3DE;color:#3B6D11}
.tag.n{background:#F2F2F2;color:#AAAAAA;text-decoration:line-through}
.note{font-size:12px;color:#6B6560;background:#F7F5F2;border-radius:7px;padding:8px 10px;margin-bottom:10px;line-height:1.5}
.reqs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.rt{font-size:11px;background:#EBF1F9;color:#0C447C;padding:2px 8px;border-radius:4px}
.meta{font-size:11px;color:#9E9890;margin-bottom:6px}
.cf{display:flex;gap:8px;border-top:1px solid #F0EDE8;padding:10px 14px}
.cf button{flex:1;justify-content:center;font-size:12px;padding:7px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,0.18)}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid #F0EDE8;position:sticky;top:0;background:#fff;z-index:1}
.mh h2{font-size:15px;font-weight:600}
.mc{background:none;border:none;font-size:20px;cursor:pointer;color:#9E9890;line-height:1;font-family:inherit}
.mb{padding:18px}
.fg{margin-bottom:16px}
.fl{display:block;font-size:12px;font-weight:600;color:#6B6560;margin-bottom:6px}
input[type=text],.fi,select,textarea{width:100%;padding:9px 12px;border:1px solid #DDD9D3;border-radius:8px;font-size:14px;background:#F7F5F2;color:#1A1A1A;font-family:inherit}
input[type=text]:focus,.fi:focus,select:focus,textarea:focus{outline:none;border-color:#185FA5;background:#fff}
textarea{resize:vertical;min-height:75px}
.cbg{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:7px}
.cbi{display:flex;align-items:center;gap:7px;padding:7px 10px;border:1px solid #DDD9D3;border-radius:8px;cursor:pointer;font-size:13px}
.cbi input{accent-color:#185FA5}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.pt{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;border:1px solid #E8E5E0}
.pt img{width:100%;height:100%;object-fit:cover}
.pd{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit}
.uz{border:2px dashed #DDD9D3;border-radius:8px;padding:18px;text-align:center;cursor:pointer;font-size:13px;color:#9E9890}
.uz:hover{border-color:#185FA5;color:#185FA5}
.upmsg{font-size:13px;color:#BA7517;padding:8px 0;text-align:center;font-weight:500}
.rr{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.re{display:inline-flex;align-items:center;gap:4px;background:#EBF1F9;color:#0C447C;padding:4px 9px;border-radius:5px;font-size:12px}
.rd{background:none;border:none;color:#A32D2D;cursor:pointer;font-size:14px;padding:0;line-height:1;font-family:inherit}
.ar{display:flex;gap:8px;margin-top:8px}
.ar input{flex:1}
.mf{display:flex;gap:8px;justify-content:flex-end;padding:14px 18px;border-top:1px solid #F0EDE8;position:sticky;bottom:0;background:#fff}
.lb{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:300;display:flex;align-items:center;justify-content:center}
.lb img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:8px}
.lbc{position:absolute;top:14px;right:18px;color:#fff;font-size:26px;cursor:pointer;background:none;border:none;font-family:inherit}
.lbn{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:26px;cursor:pointer;background:rgba(255,255,255,0.12);border:none;border-radius:50%;width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.hidden{display:none!important}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:9px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:400;pointer-events:none;opacity:0;transition:opacity 0.3s;color:#fff;white-space:nowrap}
.toast.show{opacity:1}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.empty{padding:60px 20px;text-align:center;color:#9E9890;font-size:14px}
.errbanner{background:#FDEDEB;color:#A32D2D;padding:10px 16px;text-align:center;font-size:13px;display:none}
</style>
</head>
<body>

<div class="topbar">
  <h1><span class="dot loading" id="dot"></span>租屋評估表</h1>
  <span id="ss">連線中…</span>
</div>
<div class="errbanner" id="errbanner">⚠️ 無法連線到資料庫，請稍後再試</div>
<div class="toolbar">
  <input class="si" type="text" placeholder="搜尋地址、備註…" oninput="doFilter(this.value)">
  <button class="pri" onclick="openAdd()">＋ 新增物件</button>
</div>
<div class="grid" id="grid"></div>
<div class="empty hidden" id="empty">找不到符合條件的物件</div>

<div class="ov hidden" id="ov">
  <div class="modal">
    <div class="mh"><h2 id="mt">新增物件</h2><button class="mc" onclick="closeM()">×</button></div>
    <div class="mb">
      <div class="fg"><label class="fl">地址 *</label><input type="text" class="fi" id="fa" placeholder="例：臺中市北區漢口路四段 XXX"></div>
      <div class="two">
        <div class="fg"><label class="fl">租金</label><input type="text" class="fi" id="fp" placeholder="例：12,000（含管）"></div>
        <div class="fg"><label class="fl">看屋時間</label><input type="text" class="fi" id="fv" placeholder="例：6/15 早上10:20"></div>
      </div>
      <div class="fg"><label class="fl">陽台</label><select id="fbal"><option value="">無</option><option value="小">小</option><option value="中">中</option><option value="大">大</option></select></div>
      <div class="fg"><label class="fl">設備條件</label><div class="cbg" id="cbs"></div></div>
      <div class="fg"><label class="fl">備註</label><textarea id="fn" placeholder="電費計算、特殊條件…"></textarea></div>
      <div class="fg">
        <label class="fl">個人需求標籤</label>
        <div class="rr" id="rr"></div>
        <div class="ar">
          <input type="text" id="ri" placeholder="新增需求（例：允許養貓）" onkeydown="if(event.key==='Enter')addReq()">
          <button onclick="addReq()">＋</button>
        </div>
      </div>
      <div class="fg">
        <label class="fl">照片（上傳至 Cloudinary，所有人可見）</label>
        <div class="uz" onclick="document.getElementById('fi2').click()">
          📷 點擊上傳照片（可多選）
        </div>
        <div class="upmsg hidden" id="upmsg">⏳ 上傳中，請稍候…</div>
        <input type="file" id="fi2" accept="image/*" multiple style="display:none" onchange="handlePhotos(event)">
        <div class="pg" id="pg"></div>
      </div>
      <div class="fg"><label class="cbi" style="max-width:200px"><input type="checkbox" id="fvis"> 已看過此物件</label></div>
    </div>
    <div class="mf">
      <button onclick="closeM()">取消</button>
      <button class="pri" id="sb" onclick="saveItem()">儲存</button>
    </div>
  </div>
</div>

<div class="lb hidden" id="lb">
  <button class="lbc" onclick="closeLb()">×</button>
  <button class="lbn" style="left:12px" onclick="lbNav(-1)">‹</button>
  <img id="lbi" src="" alt="">
  <button class="lbn" style="right:12px" onclick="lbNav(1)">›</button>
</div>
<div class="toast" id="toast"></div>

<script>
// ════ 設定 ════
const CLOUD_NAME = 'dyn9ekdjp';
const UPLOAD_PRESET = 'rental_unsigned';
const BIN_ID = '6a2d8279da38895dfebaaf4d';
const API_KEY = '$2a$10$ZxeUb6QdPXLL2yG43jQOAuysTo0FOgxe4WbQfmNlNbFC6ICFGoR3W';
const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
const HEADERS = {'Content-Type':'application/json','X-Access-Key':API_KEY,'X-Bin-Versioning':'false'};

const FEATS=[{k:'water',l:'台水'},{k:'electric',l:'台電'},{k:'bike',l:'子母車位'},{k:'dispenser',l:'飲水機'},{k:'elevator',l:'電梯'},{k:'subsidy',l:'租補助'}];
const SEED=[
  {id:'1',address:'臺中市北區漢口路四段 紐約廣場',price:'12,300（含管）',viewtime:'4/6 早上',visited:true,balcony:'中',water:true,electric:true,bike:true,dispenser:false,elevator:true,subsidy:true,notes:'',requirements:[],photos:[]},
  {id:'2',address:'臺中市北區山西路一段',price:'12,000（含管）',viewtime:'6/15 早上10:20',visited:false,balcony:'中',water:false,electric:false,bike:true,dispenser:true,elevator:true,subsidy:true,notes:'一度電5元，夏季6~9月一度6元；水費包含',requirements:[],photos:[]},
  {id:'3',address:'臺中市北區英士路',price:'9,000（含管）',viewtime:'',visited:false,balcony:'大',water:false,electric:false,bike:true,dispenser:true,elevator:false,subsidy:true,notes:'',requirements:[],photos:[]},
  {id:'4',address:'臺中市北屯區瀋陽路三段',price:'12,000（含管）',viewtime:'',visited:false,balcony:'中',water:false,electric:false,bike:true,dispenser:false,elevator:true,subsidy:true,notes:'',requirements:[],photos:[]},
  {id:'5',address:'臺中市北區美德街',price:'12,000',viewtime:'',visited:false,balcony:'大',water:false,electric:false,bike:false,dispenser:true,elevator:false,subsidy:false,notes:'電費一度6元',requirements:[],photos:[]},
  {id:'6',address:'臺中市北區雙十路二段',price:'12,000',viewtime:'',visited:false,balcony:'大',water:false,electric:false,bike:true,dispenser:true,elevator:false,subsidy:true,notes:'',requirements:[],photos:[]},
];

let items=[], editId=null, curP=[], curR=[], lbP=[], lbI=0, fq='', upCount=0;

// ════ 資料庫 ════
function setSyncing(state){
  const dot=document.getElementById('dot');
  const ss=document.getElementById('ss');
  if(state==='ok'){dot.className='dot ok';ss.textContent='已同步 — 所有裝置共用';}
  else if(state==='loading'){dot.className='dot loading';ss.textContent='同步中…';}
  else{dot.className='dot err';ss.textContent='連線失敗';}
}

async function loadData(){
  setSyncing('loading');
  document.getElementById('errbanner').style.display='none';
  try{
    const r=await fetch(BIN_URL+'/latest',{headers:{'X-Access-Key':API_KEY}});
    if(!r.ok) throw new Error('fetch fail '+r.status);
    const d=await r.json();
    const rec=d.record;
    if(Array.isArray(rec) && rec.length>0 && !rec[0].init){
      items=rec;
    } else {
      items=SEED;
      await saveData(true);
    }
    setSyncing('ok');
  }catch(e){
    console.error('loadData error',e);
    setSyncing('err');
    document.getElementById('errbanner').style.display='block';
    items=SEED;
  }
  render();
}

async function saveData(silent){
  if(!silent) setSyncing('loading');
  try{
    const r=await fetch(BIN_URL,{method:'PUT',headers:HEADERS,body:JSON.stringify(items)});
    if(!r.ok) throw new Error('save fail '+r.status);
    setSyncing('ok');
    return true;
  }catch(e){
    console.error('saveData error',e);
    setSyncing('err');
    showToast('儲存失敗，請檢查網路連線',false);
    return false;
  }
}

// 每30秒自動重新整理
setInterval(async()=>{
  try{
    const r=await fetch(BIN_URL+'/latest',{headers:{'X-Access-Key':API_KEY}});
    if(!r.ok) return;
    const d=await r.json();
    const rec=d.record;
    if(Array.isArray(rec) && JSON.stringify(rec)!==JSON.stringify(items)){
      items=rec;
      render();
    }
    setSyncing('ok');
  }catch(e){}
},30000);

// ════ 評分 ════
function sc(it){
  let s=0;
  if(it.water)s+=15;if(it.electric)s+=15;if(it.elevator)s+=20;
  if(it.bike)s+=15;if(it.dispenser)s+=10;if(it.subsidy)s+=15;
  if(it.balcony==='大')s+=10;else if(it.balcony==='中')s+=5;
  return s;
}

// ════ Toast ════
function showToast(msg,ok=true){
  const t=document.getElementById('toast');
  t.style.background=ok?'#3B6D11':'#A32D2D';
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// ════ Cloudinary 上傳 ════
async function uploadPhoto(file){
  const fd=new FormData();
  fd.append('file',file);
  fd.append('upload_preset',UPLOAD_PRESET);
  const r=await fetch('https://api.cloudinary.com/v1_1/'+CLOUD_NAME+'/image/upload',{method:'POST',body:fd});
  if(!r.ok) throw new Error('upload fail');
  return (await r.json()).secure_url;
}

async function handlePhotos(e){
  const files=Array.from(e.target.files);
  if(!files.length) return;
  upCount=files.length;
  document.getElementById('upmsg').classList.remove('hidden');
  document.getElementById('sb').disabled=true;
  for(const f of files){
    try{
      const url=await uploadPhoto(f);
      curP.push(url);
      renderP();
    }catch(err){
      showToast('照片上傳失敗，請確認 Cloudinary upload preset 為 rental_unsigned',false);
    }
    upCount--;
  }
  document.getElementById('upmsg').classList.add('hidden');
  document.getElementById('sb').disabled=false;
  e.target.value='';
}

function renderP(){
  document.getElementById('pg').innerHTML=curP.map((u,i)=>`<div class="pt"><img src="${u}"><button class="pd" onclick="rmP(${i})">×</button></div>`).join('');
}
function rmP(i){curP.splice(i,1);renderP();}

// ════ 渲染卡片 ════
function render(){
  const q=fq.toLowerCase();
  const list=items.filter(i=>i.address.toLowerCase().includes(q)||(i.notes||'').toLowerCase().includes(q));
  document.getElementById('grid').innerHTML=list.map(cardHTML).join('');
  document.getElementById('empty').classList.toggle('hidden',list.length>0);
}

function cardHTML(it){
  const s=sc(it);
  const ph=it.photos&&it.photos.length?it.photos[0]:null;
  const pc=it.photos?it.photos.length:0;
  const tags=FEATS.map(f=>`<span class="tag ${it[f.k]?'y':'n'}">${it[f.k]?'✓':'✗'} ${f.l}</span>`).join('');
  const note=it.notes?`<div class="note">📝 ${it.notes}</div>`:'';
  const rqs=it.requirements&&it.requirements.length?`<div class="reqs">${it.requirements.map(r=>`<span class="rt">${r}</span>`).join('')}</div>`:'';
  const mt=it.viewtime?`<div class="meta">🗓 看屋：${it.viewtime}</div>`:'';
  const bal=it.balcony?`<div class="meta">🌿 陽台：${it.balcony}</div>`:'';
  return`<div class="card">
    <div class="cphoto" onclick="openLb('${it.id}')">
      ${ph?`<img src="${ph}" alt="">`:`<div class="nophoto"><svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>尚無照片</span></div>`}
      <span class="vb ${it.visited?'y':'n'}">${it.visited?'✅ 已看':'待看'}</span>
      ${pc>1?`<span class="pcnt">${pc} 張</span>`:''}
    </div>
    <div class="cb">
      <div class="addr">${it.address}</div>
      <div class="price">${it.price||'—'} <small>/月</small></div>
      <div class="srow"><div class="sbg"><div class="sfill" style="width:${s}%"></div></div><span class="sn">${s}分</span></div>
      ${bal}${mt}<div class="tags">${tags}</div>${note}${rqs}
    </div>
    <div class="cf">
      <button onclick="openEdit('${it.id}')">✏️ 編輯</button>
      <button class="del" onclick="delItem('${it.id}')">🗑 刪除</button>
    </div>
  </div>`;
}

// ════ 表單 ════
function buildCbs(it){return FEATS.map(f=>`<label class="cbi"><input type="checkbox" id="cb_${f.k}" ${it&&it[f.k]?'checked':''}> ${f.l}</label>`).join('');}

function openAdd(){
  editId=null;curP=[];curR=[];
  document.getElementById('mt').textContent='新增物件';
  ['fa','fp','fv','fn'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fbal').value='';
  document.getElementById('fvis').checked=false;
  document.getElementById('cbs').innerHTML=buildCbs(null);
  renderR();renderP();
  document.getElementById('ov').classList.remove('hidden');
}

function openEdit(id){
  const it=items.find(i=>i.id===id);
  if(!it) return;
  editId=id;curP=[...(it.photos||[])];curR=[...(it.requirements||[])];
  document.getElementById('mt').textContent='編輯物件';
  document.getElementById('fa').value=it.address;
  document.getElementById('fp').value=it.price||'';
  document.getElementById('fv').value=it.viewtime||'';
  document.getElementById('fbal').value=it.balcony||'';
  document.getElementById('fn').value=it.notes||'';
  document.getElementById('fvis').checked=!!it.visited;
  document.getElementById('cbs').innerHTML=buildCbs(it);
  renderR();renderP();
  document.getElementById('ov').classList.remove('hidden');
}

function closeM(){document.getElementById('ov').classList.add('hidden');}
document.getElementById('ov').addEventListener('click',e=>{if(e.target===document.getElementById('ov'))closeM();});

async function saveItem(){
  if(upCount>0){showToast('照片上傳中，請稍候',false);return;}
  const addr=document.getElementById('fa').value.trim();
  if(!addr){alert('請輸入地址');return;}
  const obj={
    address:addr,
    price:document.getElementById('fp').value.trim(),
    viewtime:document.getElementById('fv').value.trim(),
    balcony:document.getElementById('fbal').value,
    notes:document.getElementById('fn').value.trim(),
    visited:document.getElementById('fvis').checked,
    photos:[...curP],
    requirements:[...curR]
  };
  FEATS.forEach(f=>{obj[f.k]=document.getElementById('cb_'+f.k).checked;});
  if(editId){
    const i=items.findIndex(x=>x.id===editId);
    items[i]={...items[i],...obj};
  } else {
    obj.id=Date.now().toString();
    items.push(obj);
  }
  const ok=await saveData();
  if(ok){render();closeM();showToast(editId?'已更新':'已新增物件');}
}

async function delItem(id){
  if(!confirm('確定要刪除這個物件嗎？')) return;
  items=items.filter(i=>i.id!==id);
  const ok=await saveData();
  if(ok){render();showToast('已刪除');}
}

function renderR(){document.getElementById('rr').innerHTML=curR.map((r,i)=>`<span class="re">${r}<button class="rd" onclick="rmR(${i})">×</button></span>`).join('');}
function addReq(){const inp=document.getElementById('ri');const v=inp.value.trim();if(!v)return;if(!curR.includes(v)){curR.push(v);renderR();}inp.value='';}
function rmR(i){curR.splice(i,1);renderR();}

// ════ Lightbox ════
function openLb(id){const it=items.find(i=>i.id===id);if(!it||!it.photos||!it.photos.length)return;lbP=it.photos;lbI=0;document.getElementById('lbi').src=lbP[0];document.getElementById('lb').classList.remove('hidden');}
function closeLb(){document.getElementById('lb').classList.add('hidden');}
function lbNav(d){lbI=(lbI+d+lbP.length)%lbP.length;document.getElementById('lbi').src=lbP[lbI];}

function doFilter(v){fq=v;render();}

// ════ 啟動 ════
loadData();
</script>
